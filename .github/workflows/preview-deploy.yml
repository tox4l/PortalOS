name: Preview Deploy

on:
  pull_request:
    branches: [main]

jobs:
  comment:
    name: Deployment Info
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: context.payload.pull_request.head.ref,
            });
            if (pulls.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Preview Deployment

        Vercel will automatically deploy a preview for this PR.

        Check the Vercel bot comment below for the preview URL once the deployment completes.

        - **Branch**: \`${context.payload.pull_request.head.ref}\`
        - **Commit**: \`${context.payload.pull_request.head.sha.slice(0, 7)}\``,
              });
            }
