name: Prisma Migrate

on:
  pull_request:
    paths:
      - prisma/schema.prisma
      - prisma/migrations/**

jobs:
  validate:
    name: Validate Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: portalos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate migrations
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url postgresql://prisma:prisma@localhost:5432/portalos_ci
        env:
          DATABASE_URL: postgresql://prisma:prisma@localhost:5432/portalos_ci
