version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    versioning-strategy: auto
    labels:
      - dependencies
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/client"
          - "@prisma/adapter-pg"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Chicago"
